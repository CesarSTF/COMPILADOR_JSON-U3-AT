events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        
        # Nombre del servidor o dominio
        server_name Grupo4;

        # DNS interno de Docker para resolución dinámica
        resolver 127.0.0.11 valid=5s;

        location / {
            # Usar variable obliga a Nginx a resolver el host en tiempo real en lugar de al arrancar
            set $upstream http://api:8000;
            proxy_pass $upstream;
            
            # Pasar headers originales para que FastAPI sepa quién es el cliente real
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
