services:
  orquestador:
    build:
      context: ./servicio-orquestador
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - red_compilador
    env_file:
      - .env
    environment:
      - URL_SERVICIO_LEXICO=http://lexico:8001
      - URL_SERVICIO_SINTACTICO=http://sintactico:8002
      - URL_SERVICIO_SEMANTICO=http://semantico:8003
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - lexico
      - sintactico
      - semantico

  lexico:
    build:
      context: ./servicio-lexico
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    networks:
      - red_compilador

  sintactico:
    build:
      context: ./servicio-sintactico
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    networks:
      - red_compilador

  semantico:
    build:
      context: ./servicio-semantico
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    networks:
      - red_compilador

networks:
  red_compilador:
    driver: bridge
